<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Table</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* ===== TOP BAR ===== */
.top-bar{
    background:#111;
    color:#fff;
    padding:15px 20px;
    display:flex;
    align-items:center;
}

.back-btn{
    background:#ff9800;
    color:#fff;
    padding:8px 16px;
    border-radius:25px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.back-btn i{
    margin-right:6px;
}

.back-btn:hover{
    background:#fff;
    color:#000;
}

/* ===== PAGE CONTAINER ===== */
.page-container{
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

/* ===== LAST BOOKING BOX ===== */
.last-booking{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

.last-booking h3{
    margin-bottom:10px;
    color:#ff9800;
}

/* ===== FORM BOX ===== */
.booking-form{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.booking-form h2{
    margin-bottom:10px;
}

.booking-form p{
    color:#666;
    margin-bottom:25px;
}

/* INPUTS */
.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
}

.input-group input,
.input-group select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

.input-group input:focus,
.input-group select:focus{
    border-color:#ff9800;
    outline:none;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#ff9800;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn i{
    margin-right:8px;
}

.submit-btn:hover{
    background:#000;
}

/* ===== POPUP ===== */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:0.3s;
    z-index:999;
}

.popup.active{
    visibility:visible;
    opacity:1;
}

.popup-content{
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}

.popup-content i{
    font-size:40px;
    color:#4CAF50;
    margin-bottom:10px;
}

.popup-content button{
    margin-top:15px;
    padding:8px 20px;
    border:none;
    background:#ff9800;
    color:#fff;
    border-radius:20px;
    cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){

    .page-container{
        margin:20px auto;
    }

    .booking-form{
        padding:20px;
    }

}
/* ===== FLOATING LABEL DESIGN ===== */

.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 14px 12px;
    border-radius: 10px;
    border: 1.5px solid #ccc;
    font-size: 14px;
    background: none;
    outline: none;
    transition: 0.3s;
}

/* Label Style */
.input-group label {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: #fff;
    padding: 0 5px;
    color: #777;
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s;
}

/* When Focus or Filled */
.input-group input:focus,
.input-group select:focus {
    border-color: #ff9800;
    box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.15);
}

.input-group input:focus+label,
.input-group input:not(:placeholder-shown)+label,
.input-group select:focus+label,
.input-group select:valid+label {
    top: -8px;
    font-size: 12px;
    color: #ff9800;
}

/* Remove default blue outline */
input:focus {
    outline: none;
}/* ===== PROFESSIONAL LAST BOOKING CARD ===== */

.booking-card{
    background: linear-gradient(135deg,#fff,#fff7ed);
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    border:1px solid #ffe0b2;
    animation: fadeIn 0.4s ease-in-out;
}

.booking-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

.booking-header i{
    color:#4CAF50;
    font-size:22px;
}

.booking-header h4{
    font-size:18px;
    color:#333;
}

.booking-details{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.booking-details div{
    background:#fff;
    padding:12px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.booking-details span{
    display:block;
    font-size:12px;
    color:#777;
    margin-bottom:4px;
}

.booking-details strong{
    font-size:14px;
    color:#111;
}

@media(max-width:600px){
    .booking-details{
        grid-template-columns:1fr;
    }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}.popup-content i {
    font-size: 40px;
    color: #4CAF50;
    margin-bottom: 10px;
}/* Booking ID Style */

.booking-id {
    background: #fff3e0;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 15px;
    color: #ff9800;
    font-weight: 600;
    text-align: center;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>
</div>

<div class="page-container">

    <!-- LAST BOOKING INFO -->
    <div class="last-booking" id="lastBooking">
        <h3>Last Booking</h3>
        <p>No booking yet.</p>
    </div>

    <!-- BOOKING FORM -->
<div class="booking-form">
    
    <h2>Book Your Table</h2>
    <p>Reserve your seat and enjoy premium dining experience.</p>
    
    <form id="bookingForm">
        
        <input type="hidden" name="access_key" value="96018cbc-b973-4274-9edc-dd2120e8f623">
        
        <!-- Full Name -->
        <div class="input-group">
            <input type="text" name="name" placeholder=" " required>
            <label>Full Name</label>
        </div>
        
        <!-- Email -->
        <div class="input-group">
            <input type="email" name="email" placeholder=" " required>
            <label>Email Address</label>
        </div>
        
        <!-- Phone -->
        <div class="input-group">
            <input type="tel" name="phone" placeholder=" " required>
            <label>Phone Number</label>
        </div>
        
        <!-- Date -->
        <div class="input-group">
            <input type="date" name="date" placeholder=" " required>
            <label>Select Date</label>
        </div>
        
        <!-- Time -->
        <div class="input-group">
            <input type="time" name="time" placeholder=" " required>
            <label>Select Time</label>
        </div>
        
        <!-- Guests -->
        <div class="input-group">
            <select name="guests" required>
                <option value="" disabled selected hidden></option>
                <option>1 Person</option>
                <option>2 People</option>
                <option>3 People</option>
                <option>4 People</option>
                <option>5+ People</option>
            </select>
            <label>Number of Guests</label>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="submit-btn">
            <i class="fas fa-calendar-check"></i> Confirm Booking
        </button>
        
    </form>
    
</div>

</div>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="popup">
    <div class="popup-content">
        <i class="fas fa-circle-check"></i>
        <h3>Booking Confirmed</h3>
        <p>Your table has been successfully booked.</p>
        <button id="closePopup">Close</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        const form = document.getElementById("bookingForm");
        const popup = document.getElementById("successPopup");
        const closePopup = document.getElementById("closePopup");
        const lastBookingBox = document.getElementById("lastBooking");
        const submitBtn = document.querySelector(".submit-btn");
        
        // ===============================
        // LOAD LAST BOOKING ON PAGE LOAD
        // ===============================
        const savedBooking = localStorage.getItem("lastBooking");
        
        if (savedBooking) {
            lastBookingBox.innerHTML = savedBooking;
        }
        
        // ===============================
        // FORM SUBMIT
        // ===============================
        form.addEventListener("submit", function(e) {
            e.preventDefault();
            
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            submitBtn.innerHTML = "Processing...";
            submitBtn.disabled = true;
            
            // Generate Unique Booking ID
const bookingID = "BK" + Date.now();

// Create FormData
const formData = new FormData(form);

// Append booking ID to API
formData.append("booking_id", bookingID);
            
            fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    
                    if (data.success) {
                        
                        // Get form values
                        const name = form.querySelector('input[name="name"]').value;
                        const email = form.querySelector('input[name="email"]').value;
                        const phone = form.querySelector('input[name="phone"]').value;
                        
                        const guests = form.querySelector('select[name="guests"]').value;
                        const date = form.querySelector('input[name="date"]').value;
                        const time = form.querySelector('input[name="time"]').value;
                        
                        const bookingHTML = `
    <div class="booking-card">
        <div class="booking-header">
            <i class="fas fa-check-circle"></i>
            <h4>Booking Confirmed</h4>
        </div>

        <div class="booking-id">
            Booking ID: <strong>${bookingID}</strong>
        </div>

        <div class="booking-details">
            <div><span>Name</span><strong>${name}</strong></div>
            <div><span>Email</span><strong>${email}</strong></div>
            <div><span>Phone</span><strong>${phone}</strong></div>
            <div><span>Guests</span><strong>${guests}</strong></div>
            <div><span>Date</span><strong>${date}</strong></div>
            <div><span>Time</span><strong>${time}</strong></div>
        </div>
    </div>
`;
                        
                        // Save to localStorage
                        localStorage.setItem("lastBooking", bookingHTML);
                        
                        // Show in page
                        lastBookingBox.innerHTML = bookingHTML;
                        
                        // Show popup
                        popup.classList.add("active");
                        
                        form.reset();
                        
                    } else {
                        alert("Booking failed. Please try again.");
                    }
                    
                    submitBtn.innerHTML = '<i class="fas fa-calendar-check"></i> Confirm Booking';
                    submitBtn.disabled = false;
                    
                })
                .catch(error => {
                    
                    alert("Network error. Please try again.");
                    
                    submitBtn.innerHTML = '<i class="fas fa-calendar-check"></i> Confirm Booking';
                    submitBtn.disabled = false;
                    
                });
            
        });
        
        // ===============================
        // CLOSE POPUP FIX
        // ===============================
        closePopup.addEventListener("click", function() {
            popup.classList.remove("active");
        });
        
        // Close popup when clicking outside
        window.addEventListener("click", function(e) {
            if (e.target === popup) {
                popup.classList.remove("active");
            }
        });
        
    });

document.addEventListener("DOMContentLoaded", function(){

    // Get today date
    const today = new Date();

    // Format Date (YYYY-MM-DD)
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    const formattedDate = `${year}-${month}-${day}`;

    // Set Date Input
    document.querySelector('input[name="date"]').value = formattedDate;


    // Add 1 Minute to Current Time
    today.setMinutes(today.getMinutes() + 1);

    const hours = String(today.getHours()).padStart(2, '0');
    const minutes = String(today.getMinutes()).padStart(2, '0');
    const formattedTime = `${hours}:${minutes}`;

    // Set Time Input
    document.querySelector('input[name="time"]').value = formattedTime;

});
</script>

</body>
</html>
